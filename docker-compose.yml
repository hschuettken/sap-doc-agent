services:
  web:
    build: .
    command: uvicorn spec2sphere.web.server:create_app --factory --host 0.0.0.0 --port 8080
    ports:
      - "8260:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${SPEC2SPHERE_LLM_PROVIDER:-${LLM_PROVIDER:-router}}
      - LLM_ROUTER_URL=${SPEC2SPHERE_LLM_ROUTER_URL:-${LLM_ROUTER_URL:-http://192.168.0.50:8070/v1}}
      - LLM_ROUTER_API_KEY=${SPEC2SPHERE_LLM_ROUTER_API_KEY:-${LLM_ROUTER_API_KEY:-}}
      - LLM_ROUTER_MODEL=${SPEC2SPHERE_LLM_ROUTER_MODEL:-${LLM_ROUTER_MODEL:-qwen2.5:14b}}
      - MULTI_TENANT=${SPEC2SPHERE_MULTI_TENANT:-${MULTI_TENANT:-true}}
      - BROWSER_MODE=${SPEC2SPHERE_BROWSER_MODE:-${BROWSER_MODE:-container}}
      - BROWSER_CDP_URL=${SPEC2SPHERE_BROWSER_CDP_URL:-${BROWSER_CDP_URL:-http://chrome:9222}}
      - DSP_BASE_URL=${SPEC2SPHERE_DSP_BASE_URL:-${DSP_BASE_URL:-}}
      - DSP_CLIENT_ID=${DSP_CLIENT_ID:-}
      - DSP_CLIENT_SECRET=${DSP_CLIENT_SECRET:-}
      - DSP_TOKEN_URL=${DSP_TOKEN_URL:-}
      - DSP_API_TOKEN=${DSP_API_TOKEN:-}
      - BOOKSTACK_TOKEN=${BOOKSTACK_TOKEN:-}
      - SECRET_KEY=${SPEC2SPHERE_SECRET_KEY:-${SECRET_KEY:-spec2sphere-demo-secret-change-me}}
      - ENABLED_MODULES=${SPEC2SPHERE_ENABLED_MODULES:-${ENABLED_MODULES:-core,migration_accelerator,dsp_factory,sac_factory,governance,artifact_lab,multi_tenant}}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      # Quality router config persistence path
      - LLM_ROUTING_CONFIG=/app/data/llm_routing.json
    volumes:
      - output-data:/app/output
      - routing-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q scan,llm,ai-batch -c 4 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${LLM_PROVIDER:-router}
      - LLM_ROUTER_URL=${LLM_ROUTER_URL:-http://192.168.0.50:8070/v1}
      - LLM_ROUTER_API_KEY=${LLM_ROUTER_API_KEY:-}
      - LLM_ROUTER_MODEL=${LLM_ROUTER_MODEL:-qwen2.5:14b}
      - LLM_ROUTING_CONFIG=/app/data/llm_routing.json
      # dsp-ai batch tasks (ai-batch queue) use LLM_ENDPOINT + Neo4j
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://192.168.0.50:8070/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    volumes:
      - output-data:/app/output
      - routing-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      redis:
        condition: service_healthy
    # Override the image's HTTP /healthz HEALTHCHECK — celery workers don't serve HTTP.
    healthcheck:
      test: ["CMD-SHELL", "celery -A spec2sphere.tasks.celery_app inspect ping -d celery@$$HOSTNAME -t 5 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  worker-chrome:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q chrome,sac -c 1 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BROWSER_MODE=${BROWSER_MODE:-container}
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
      - DSP_BASE_URL=${DSP_BASE_URL:-}
      - DSP_API_TOKEN=${DSP_API_TOKEN:-}
    volumes:
      - output-data:/app/output
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      redis:
        condition: service_healthy
      chrome:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A spec2sphere.tasks.celery_app inspect ping -d celery@$$HOSTNAME -t 5 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  scheduler:
    build: .
    command: celery -A spec2sphere.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Beat doesn't expose a ping endpoint and python:slim lacks procps/pgrep.
    # PID 1 is the celery beat command; check its cmdline contains 'beat' plus the schedule file.
    healthcheck:
      test: ["CMD-SHELL", "grep -aq beat /proc/1/cmdline && [ -f /tmp/celerybeat-schedule ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sapdoc
      POSTGRES_USER: sapdoc
      POSTGRES_PASSWORD: sapdoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapdoc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  neo4j:
    image: neo4j:5-community
    container_name: sap-doc-agent-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?must_be_set}
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  searxng:
    image: searxng/searxng:latest
    container_name: sap-doc-agent-searxng
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me}
    volumes:
      - ./searxng:/etc/searxng:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  dsp-ai:
    build: .
    container_name: sap-doc-agent-dsp-ai
    command: ["uvicorn", "spec2sphere.dsp_ai.service:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://llm-router:8070/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?must_be_set}
      - SEARXNG_ENABLED=${SEARXNG_ENABLED:-true}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080/search}
      - WIDGET_ALLOWED_ORIGINS=${WIDGET_ALLOWED_ORIGINS:-}
      - STUDIO_AUTHOR_EMAILS=${STUDIO_AUTHOR_EMAILS:-}
      - LLM_ROUTING_CONFIG=/app/data/llm_routing.json
    volumes:
      - routing-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    ports:
      - "8261:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - app-network

  chrome:
    build:
      context: docker/chrome
      dockerfile: Dockerfile
    ports:
      - "5900:5900"    # VNC for debugging/demos
      - "9222:9222"    # Chrome DevTools Protocol
    shm_size: "2gb"
    healthcheck:
      # Chrome image ships wget, not curl.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9222/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network

  novnc:
    image: theasp/novnc:latest
    environment:
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - RUN_XTERM=no
    ports:
      - "6080:8080"
    depends_on:
      chrome:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  output-data:
  routing-data:
  neo4j-data:
  neo4j-logs:

networks:
  app-network:
    driver: bridge
