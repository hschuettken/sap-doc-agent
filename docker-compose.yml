services:
  web:
    build: .
    entrypoint: ["/app/entrypoint.sh"]
    command: uvicorn spec2sphere.web.server:create_app --factory --host 0.0.0.0 --port 8080
    ports:
      - "8260:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${LLM_PROVIDER:-router}
      - MULTI_TENANT=${MULTI_TENANT:-false}
      - BROWSER_MODE=${BROWSER_MODE:-container}
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
    volumes:
      - output-data:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q scan,llm -c 4 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${LLM_PROVIDER:-router}
    volumes:
      - output-data:/app/output
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker-chrome:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q chrome,sac -c 1 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BROWSER_MODE=${BROWSER_MODE:-container}
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
    volumes:
      - output-data:/app/output
    depends_on:
      redis:
        condition: service_healthy
      chrome:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build: .
    command: celery -A spec2sphere.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sapdoc
      POSTGRES_USER: sapdoc
      POSTGRES_PASSWORD: sapdoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapdoc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  chrome:
    build:
      context: docker/chrome
      dockerfile: Dockerfile
    ports:
      - "5900:5900"    # VNC for debugging/demos
      - "9222:9222"    # Chrome DevTools Protocol
    shm_size: "2gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres-data:
  output-data:

networks:
  app-network:
    driver: bridge
