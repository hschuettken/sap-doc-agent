services:
  web:
    build: .
    command: uvicorn spec2sphere.web.server:create_app --factory --host 0.0.0.0 --port 8080
    ports:
      - "8260:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${SPEC2SPHERE_LLM_PROVIDER:-${LLM_PROVIDER:-router}}
      - LLM_ROUTER_URL=${SPEC2SPHERE_LLM_ROUTER_URL:-${LLM_ROUTER_URL:-http://192.168.0.50:8070/v1}}
      - LLM_ROUTER_API_KEY=${SPEC2SPHERE_LLM_ROUTER_API_KEY:-${LLM_ROUTER_API_KEY:-}}
      - LLM_ROUTER_MODEL=${SPEC2SPHERE_LLM_ROUTER_MODEL:-${LLM_ROUTER_MODEL:-qwen2.5:14b}}
      - MULTI_TENANT=${SPEC2SPHERE_MULTI_TENANT:-${MULTI_TENANT:-true}}
      - BROWSER_MODE=${SPEC2SPHERE_BROWSER_MODE:-${BROWSER_MODE:-container}}
      - BROWSER_CDP_URL=${SPEC2SPHERE_BROWSER_CDP_URL:-${BROWSER_CDP_URL:-http://chrome:9222}}
      - DSP_BASE_URL=${SPEC2SPHERE_DSP_BASE_URL:-${DSP_BASE_URL:-}}
      - DSP_CLIENT_ID=${DSP_CLIENT_ID:-}
      - DSP_CLIENT_SECRET=${DSP_CLIENT_SECRET:-}
      - DSP_TOKEN_URL=${DSP_TOKEN_URL:-}
      - DSP_API_TOKEN=${DSP_API_TOKEN:-}
      - BOOKSTACK_TOKEN=${BOOKSTACK_TOKEN:-}
      - SECRET_KEY=${SPEC2SPHERE_SECRET_KEY:-${SECRET_KEY:-spec2sphere-demo-secret-change-me}}
      - ENABLED_MODULES=${SPEC2SPHERE_ENABLED_MODULES:-${ENABLED_MODULES:-core,migration_accelerator,dsp_factory,sac_factory,governance,artifact_lab,multi_tenant}}
      # Quality router config persistence path
      - LLM_ROUTING_CONFIG=/app/data/llm_routing.json
    volumes:
      - output-data:/app/output
      - routing-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q scan,llm -c 4 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LLM_PROVIDER=${LLM_PROVIDER:-router}
      - LLM_ROUTER_URL=${LLM_ROUTER_URL:-http://192.168.0.50:8070/v1}
      - LLM_ROUTER_API_KEY=${LLM_ROUTER_API_KEY:-}
      - LLM_ROUTER_MODEL=${LLM_ROUTER_MODEL:-qwen2.5:14b}
      - LLM_ROUTING_CONFIG=/app/data/llm_routing.json
    volumes:
      - output-data:/app/output
      - routing-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  worker-chrome:
    build: .
    command: celery -A spec2sphere.tasks.celery_app worker -Q chrome,sac -c 1 --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BROWSER_MODE=${BROWSER_MODE:-container}
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
      - DSP_BASE_URL=${DSP_BASE_URL:-}
      - DSP_API_TOKEN=${DSP_API_TOKEN:-}
    volumes:
      - output-data:/app/output
      - ./config.yaml:/app/config.yaml:ro
      - ./standards:/app/standards:ro
    depends_on:
      redis:
        condition: service_healthy
      chrome:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build: .
    command: celery -A spec2sphere.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://sapdoc:sapdoc@postgres:5432/sapdoc}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sapdoc
      POSTGRES_USER: sapdoc
      POSTGRES_PASSWORD: sapdoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapdoc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  chrome:
    build:
      context: docker/chrome
      dockerfile: Dockerfile
    ports:
      - "5900:5900"    # VNC for debugging/demos
      - "9222:9222"    # Chrome DevTools Protocol
    shm_size: "2gb"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network

  novnc:
    image: theasp/novnc:latest
    environment:
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - RUN_XTERM=no
    ports:
      - "6080:8080"
    depends_on:
      chrome:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  output-data:
  routing-data:

networks:
  app-network:
    driver: bridge
