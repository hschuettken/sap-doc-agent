{% extends "base.html" %}
{% block title %}Audit — Spec2Sphere{% endblock %}
{% block page_title %}Documentation Audit{% endblock %}

{% block content %}
<div id="content-inner" style="max-width:768px;">
<div class="atlas-card">
    <div class="atlas-card-content">
    <form id="audit-form" class="atlas-stack">
        <!-- Step 1: Upload -->
        <div id="step-upload" class="atlas-stack">
            <h3 style="font-size:var(--atlas-text-base);font-weight:var(--atlas-font-weight-semibold);color:var(--atlas-color-fg);margin:0;">Step 1: Upload Documents</h3>

            <div class="atlas-field">
                <label class="atlas-label">Audit Name</label>
                <input type="text" id="audit-name" placeholder="e.g. Client X Q2 Review" class="atlas-input">
            </div>

            <div class="atlas-field">
                <label class="atlas-label">Documents (paste content)</label>
                <div id="doc-entries" class="atlas-stack-sm">
                    <div class="doc-entry atlas-panel">
                        <input type="text" placeholder="Document title" class="doc-title atlas-input" style="margin-bottom:var(--atlas-space-2);">
                        <textarea placeholder="Paste document content here..." class="doc-content atlas-textarea" style="height:96px;"></textarea>
                    </div>
                </div>
                <button type="button" onclick="addDoc()" class="atlas-btn atlas-btn--link atlas-btn--sm">+ Add another document</button>
            </div>

            <div class="atlas-field">
                <label class="atlas-label">Client Standard <span style="color:var(--atlas-color-fg-subtle);font-weight:normal;">(optional)</span></label>
                <textarea id="client-standard" placeholder="Paste client documentation standard..." class="atlas-textarea" style="height:80px;"></textarea>
            </div>

            <div class="atlas-field">
                <label class="atlas-label">Scope</label>
                <select id="audit-scope" class="atlas-select" style="width:auto;">
                    <option value="application">Application Level</option>
                    <option value="system">System Level</option>
                </select>
            </div>

            <div>
                <button type="button" onclick="runAudit()" class="atlas-btn atlas-btn--primary">
                    Run Audit
                </button>
            </div>
        </div>

        <!-- Results -->
        <div id="audit-results" style="display:none;" class="atlas-stack">
            <h3 style="font-size:var(--atlas-text-base);font-weight:var(--atlas-font-weight-semibold);color:var(--atlas-color-fg);margin:0;">Audit Results</h3>
            <div id="results-content"></div>
            <div>
                <button type="button" onclick="resetAudit()" class="atlas-btn atlas-btn--secondary">
                    New Audit
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="audit-loading" style="display:none;" class="atlas-empty">
            <div style="width:32px;height:32px;border:2px solid var(--atlas-color-primary);border-top-color:transparent;border-radius:50%;animation:atlas-spin var(--atlas-duration-slow) linear infinite;"></div>
            <p class="atlas-empty-body" style="margin-top:var(--atlas-space-2);">Running audit…</p>
        </div>
    </form>
    </div>
</div>
</div>

<script>
function addDoc() {
    var entry = document.createElement('div');
    entry.className = 'doc-entry atlas-panel';
    entry.innerHTML =
        '<input type="text" placeholder="Document title" class="doc-title atlas-input" style="margin-bottom:var(--atlas-space-2);">'
        + '<textarea placeholder="Paste document content..." class="doc-content atlas-textarea" style="height:96px;"></textarea>'
        + '<button type="button" onclick="this.parentElement.remove()" class="atlas-btn atlas-btn--link atlas-btn--sm" style="color:var(--atlas-color-destructive);margin-top:var(--atlas-space-1);">Remove</button>';
    document.getElementById('doc-entries').appendChild(entry);
}

async function runAudit() {
    var docs = [];
    document.querySelectorAll('.doc-entry').forEach(function(entry) {
        var title = entry.querySelector('.doc-title').value;
        var content = entry.querySelector('.doc-content').value;
        if (title && content) docs.push({title: title, content: content});
    });
    if (docs.length === 0) { showToast('Add at least one document', 'error'); return; }

    document.getElementById('step-upload').style.display = 'none';
    document.getElementById('audit-loading').style.display = 'flex';

    var body = {
        documents: docs,
        application_name: document.getElementById('audit-name').value || 'Unnamed',
        scope: document.getElementById('audit-scope').value,
    };
    var clientStd = document.getElementById('client-standard').value;
    if (clientStd) body.client_standard = clientStd;

    try {
        var resp = await fetch('/api/audit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        var data = await resp.json();
        document.getElementById('audit-loading').style.display = 'none';
        document.getElementById('audit-results').style.display = 'block';

        var html = '';
        if (data.score !== undefined) {
            html += '<div style="margin-bottom:var(--atlas-space-3);"><span style="font-size:var(--atlas-text-2xl);font-weight:var(--atlas-font-weight-bold);color:var(--atlas-color-fg);">' + data.score.toFixed(1) + '%</span> <span style="color:var(--atlas-color-fg-muted);">overall score</span></div>';
            html += '<p style="font-size:var(--atlas-text-sm);color:var(--atlas-color-fg-muted);margin-bottom:var(--atlas-space-2);">' + data.sections_found + '/' + data.sections_total + ' sections found</p>';
        }
        if (data.horvath_score !== undefined) {
            html += '<div class="atlas-grid-2" style="margin-bottom:var(--atlas-space-3);">';
            html += '<div class="atlas-kpi"><div class="atlas-kpi-value">' + data.horvath_score.toFixed(1) + '%</div><div class="atlas-kpi-label">Horváth Standard</div></div>';
            html += '<div class="atlas-kpi"><div class="atlas-kpi-value">' + data.client_score.toFixed(1) + '%</div><div class="atlas-kpi-label">Client Standard</div></div>';
            html += '</div>';
        }
        if (data.issues) {
            html += '<h4 style="font-size:var(--atlas-text-sm);font-weight:var(--atlas-font-weight-medium);margin:var(--atlas-space-3) 0 var(--atlas-space-1);">Issues</h4><ul style="display:flex;flex-direction:column;gap:var(--atlas-space-1);">';
            data.issues.forEach(function(i) { html += '<li style="display:flex;gap:var(--atlas-space-2);font-size:var(--atlas-text-sm);color:var(--atlas-color-fg-muted);"><span class="atlas-badge atlas-badge--warning">!</span>' + i + '</li>'; });
            html += '</ul>';
        }
        if (data.suggestions) {
            html += '<h4 style="font-size:var(--atlas-text-sm);font-weight:var(--atlas-font-weight-medium);margin:var(--atlas-space-3) 0 var(--atlas-space-1);">Suggestions</h4><ul style="display:flex;flex-direction:column;gap:var(--atlas-space-1);">';
            data.suggestions.forEach(function(s) { html += '<li style="font-size:var(--atlas-text-sm);color:var(--atlas-color-fg-muted);">' + s + '</li>'; });
            html += '</ul>';
        }
        document.getElementById('results-content').innerHTML = html;
    } catch (err) {
        document.getElementById('audit-loading').style.display = 'none';
        document.getElementById('step-upload').style.display = 'block';
        showToast('Audit failed: ' + err.message, 'error');
    }
}

function resetAudit() {
    document.getElementById('audit-results').style.display = 'none';
    document.getElementById('step-upload').style.display = 'block';
}
</script>
{% endblock %}
