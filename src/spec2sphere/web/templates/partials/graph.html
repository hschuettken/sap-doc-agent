{% extends "base.html" %}
{% block title %}Dependencies — Spec2Sphere{% endblock %}
{% block page_title %}Dependency Graph{% endblock %}

{% block content %}
<style>
#graph-container {
    height: calc(100vh - 180px);
    background: var(--atlas-color-elevated);
    border-radius: var(--atlas-radius-lg);
    border: 1px solid var(--atlas-color-border);
}
#node-panel {
    position: absolute;
    right: var(--atlas-space-6);
    top: 5rem;
    width: 300px;
    z-index: var(--atlas-z-dropdown);
    display: none;
}
</style>

<!-- Filters -->
<div class="atlas-card" style="margin-bottom:var(--atlas-space-4);">
    <div class="atlas-card-content">
        <div class="atlas-cluster">
            <input type="text" id="graph-search" placeholder="Search nodes…"
                   class="atlas-input" style="flex:1; min-width:200px;">
            <select id="graph-type-filter" class="atlas-select">
                <option value="">All Types</option>
            </select>
            <select id="graph-layer-filter" class="atlas-select">
                <option value="">All Layers</option>
            </select>
            <button onclick="resetGraph()" class="atlas-btn atlas-btn--secondary atlas-btn--sm">Reset</button>
        </div>
    </div>
</div>

<div id="graph-container"></div>

<!-- Node info panel -->
<div id="node-panel" class="atlas-card">
    <div class="atlas-card-header">
        <div class="atlas-split">
            <h3 id="panel-name" class="atlas-section-title" style="margin:0;"></h3>
            <button onclick="document.getElementById('node-panel').style.display='none'"
                    class="atlas-btn atlas-btn--ghost atlas-btn--icon-only atlas-btn--sm"
                    aria-label="Close">&times;</button>
        </div>
    </div>
    <div class="atlas-card-content atlas-stack-sm">
        <p id="panel-id" style="font-family:var(--atlas-font-mono); font-size:var(--atlas-text-xs); color:var(--atlas-color-fg-muted);"></p>
        <div id="panel-details" style="font-size:var(--atlas-text-sm);"></div>
        <a id="panel-link" href="#" style="font-size:var(--atlas-text-sm);">View Detail &rarr;</a>
    </div>
</div>

<script>
if (typeof vis === 'undefined') {
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js';
    s.onload = function() { const graphData = {{ graph_data | safe }}; initGraph(graphData); };
    document.head.appendChild(s);
} else {
    const graphData = {{ graph_data | safe }};
    initGraph(graphData);
}
</script>
<script src="/static/graph.js"></script>
{% endblock %}
