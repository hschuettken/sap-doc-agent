{% extends "base.html" %}
{% block title %}Edit "{{ enh.name }}" — AI Studio{% endblock %}
{% block page_title %}
  Edit: {{ enh.name }}
  <span class="text-gray-400 text-sm">v{{ enh.version }} · {{ enh.status }}</span>
{% endblock %}
{% block content %}
<div class="grid grid-cols-2 gap-4">
  <div class="bg-white rounded-lg shadow p-4">
    <label class="block text-sm font-medium text-gray-700 mb-2">Config JSON</label>
    <textarea id="config-editor"
              class="w-full h-96 font-mono text-sm border rounded p-3 focus:outline-purple-500">{{ config_json }}</textarea>
    <div class="mt-3 flex gap-2 items-center">
      <button id="btn-save" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded text-sm">Save draft</button>
      <button id="btn-preview" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm">Run preview</button>
      <form method="post" action="/ai-studio/{{ enh.id }}/publish" class="ml-auto">
        <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm">Publish</button>
      </form>
    </div>
    <div id="save-status" class="mt-2 text-xs text-gray-500"></div>
  </div>

  <div class="bg-white rounded-lg shadow p-4">
    <h3 class="font-medium text-gray-700 mb-2">Preview</h3>
    <pre id="preview-output" class="text-sm bg-gray-50 p-3 rounded h-96 overflow-auto font-mono">— click “Run preview” to evaluate —</pre>
  </div>
</div>

<script>
(function () {
  const ENH_ID = {{ enh.id|tojson }};
  const EMAIL  = {{ (user.email if user else 'preview@localhost')|tojson }};
  const out    = document.getElementById('preview-output');
  const status = document.getElementById('save-status');

  async function runPreview() {
    out.textContent = 'Running…';
    try {
      const resp = await fetch(`/ai-studio/${ENH_ID}/preview`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-User-Email': EMAIL},
        body: JSON.stringify({user: EMAIL, context_hints: {}})
      });
      const data = await resp.json();
      out.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      out.textContent = 'preview failed: ' + err;
    }
  }

  async function saveDraft() {
    const txt = document.getElementById('config-editor').value;
    let parsed;
    try { parsed = JSON.parse(txt); }
    catch (err) { status.textContent = 'invalid JSON — ' + err.message; return; }
    status.textContent = 'saving…';
    const resp = await fetch(`/ai-studio/${ENH_ID}/config`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', 'X-User-Email': EMAIL},
      body: JSON.stringify(parsed)
    });
    status.textContent = resp.ok ? 'saved' : 'save failed (' + resp.status + ')';
  }

  document.getElementById('btn-preview').addEventListener('click', runPreview);
  document.getElementById('btn-save').addEventListener('click', saveDraft);
})();
</script>
{% endblock %}
