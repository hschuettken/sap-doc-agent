<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          petrol: { DEFAULT: '#05415A', light: '#0a6b8f', dark: '#032d3e' },
        }
      }
    }
  }
  </script>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-hidden">

<div id="browser-viewer-full" class="bg-gray-900 h-screen flex flex-col">
  <!-- Control Bar -->
  <div class="flex items-center justify-between px-4 py-2 bg-gray-800 text-white text-sm flex-shrink-0">
    <div class="flex items-center gap-3">
      <!-- Connection Status -->
      <span id="viewer-status" class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
        <span>Connected</span>
      </span>
      <!-- Current Task -->
      <span id="viewer-task" class="text-gray-400">
        {% if task_name %}Watching: {{ task_name }}{% else %}Idle{% endif %}
      </span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Viewer Count -->
      <span id="viewer-count" class="text-gray-400">{{ viewer_count }} watching</span>
      <!-- Fullscreen Button -->
      <button onclick="toggleFullscreen()" class="px-2 py-1 bg-gray-700 rounded hover:bg-gray-600 text-xs font-medium transition">Fullscreen</button>
    </div>
  </div>
  <!-- noVNC Iframe -->
  <iframe id="vnc-iframe"
          src="{{ novnc_url }}"
          class="w-full flex-1 border-0"
          allow="clipboard-read; clipboard-write">
  </iframe>
</div>

<script>
function toggleFullscreen() {
  const iframe = document.getElementById('vnc-iframe');
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen().catch(err => {
      console.warn('Fullscreen request failed:', err);
    });
  }
}

setInterval(function() {
  fetch('/api/factory/active')
    .then(r => r.json())
    .then(data => {
      if (data.task_name) {
        document.getElementById('viewer-task').textContent = 'Watching: ' + data.task_name;
      }
    })
    .catch(err => {
      console.debug('Factory status poll error:', err);
    });
}, 10000);
</script>

</body>
</html>
