<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          petrol: { DEFAULT: '#05415A', light: '#0a6b8f', dark: '#032d3e' },
        }
      }
    }
  }
  </script>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-hidden">

<div id="browser-viewer-full" class="bg-gray-900 h-screen flex flex-col">
  <!-- Control Bar -->
  <div class="flex items-center justify-between px-4 py-2 bg-gray-800 text-white text-sm flex-shrink-0">
    <div class="flex items-center gap-3">
      <!-- Connection Status -->
      <span id="viewer-status" class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
        <span>Connected</span>
      </span>
      <!-- Current Task -->
      <span id="viewer-task" class="text-gray-400">
        {% if task_name %}Watching: {{ task_name }}{% else %}Idle{% endif %}
      </span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Viewer Count -->
      <span id="viewer-count" class="text-gray-400">{{ viewer_count }} watching</span>
      <!-- Fullscreen Button -->
      <button onclick="toggleFullscreen()" class="px-2 py-1 bg-gray-700 rounded hover:bg-gray-600 text-xs font-medium transition">Fullscreen</button>
    </div>
  </div>
  <!-- noVNC Iframe -->
  <iframe id="vnc-iframe"
          src="{{ novnc_url }}"
          class="w-full flex-1 border-0"
          allow="clipboard-read; clipboard-write">
  </iframe>
</div>

<script>
function toggleFullscreen() {
  const iframe = document.getElementById('vnc-iframe');
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen().catch(err => {
      console.warn('Fullscreen request failed:', err);
    });
  }
}

// Session B: replaced setInterval poll with SSE over Postgres LISTEN/NOTIFY.
// Publishers emit 'factory_status_changed'; we re-fetch /api/factory/active
// on each event. On SSE failure, fall back to a 30s poll.
(function () {
  function refreshStatus() {
    fetch('/api/factory/active')
      .then(function (r) { return r.text(); })
      .then(function (html) {
        var badge = document.getElementById('active-badge');
        if (badge) { badge.innerHTML = html; }
      })
      .catch(function (err) { console.debug('Factory status refresh error:', err); });
  }
  refreshStatus();
  try {
    var es = new EventSource('/events/browser');
    es.addEventListener('update', function () { refreshStatus(); });
    es.addEventListener('error', function () {
      // If the SSE endpoint itself is broken, fall back to a low-frequency poll.
      if (!window._factoryFallbackPoll) {
        window._factoryFallbackPoll = setInterval(refreshStatus, 30000);
      }
    });
    window.addEventListener('beforeunload', function () { es.close(); });
  } catch (e) {
    console.debug('SSE unavailable, falling back to poll:', e);
    setInterval(refreshStatus, 30000);
  }
})();
</script>

</body>
</html>
