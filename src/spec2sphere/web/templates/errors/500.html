<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — Spec2Sphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F5F5F5; color: #353434; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; }
        .code { font-family: Georgia, serif; font-size: 4.5rem; color: #DC2626; line-height: 1; margin-bottom: 0.5rem; font-weight: 400; }
        .bar { width: 48px; height: 3px; background: #C8963E; margin: 1rem auto 1.5rem; border-radius: 2px; }
        h1 { font-family: Georgia, serif; color: #05415A; font-size: 1.5rem; margin-bottom: 0.75rem; font-weight: 400; }
        p { color: #6b7280; font-size: 0.9375rem; line-height: 1.6; margin-bottom: 1.25rem; }
        .trace-id { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; background: #F5F5F5; padding: 0.375rem 0.625rem; border-radius: 4px; font-size: 0.75rem; color: #6b7280; display: inline-block; margin-bottom: 1.5rem; }
        .btns { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        a.btn, button.btn { display: inline-block; padding: 0.625rem 1.25rem; text-decoration: none; border-radius: 4px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
        a.btn.primary { background: #05415A; color: #fff; }
        a.btn.primary:hover { background: #032d3e; }
        button.btn.ghost { background: #fff; color: #05415A; border: 1px solid #E5E5E5; }
        button.btn.ghost:hover { background: #F5F5F5; }
        .btn:focus-visible { outline: 2px solid #C8963E; outline-offset: 2px; }
    </style>
</head>
<body>
    <main class="card">
        <div class="code">500</div>
        <div class="bar" aria-hidden="true"></div>
        <h1>Something went wrong</h1>
        <p>An unexpected error interrupted your request. The team has been notified.</p>
        {% if trace_id %}<div class="trace-id">Trace: {{ trace_id }}</div>{% endif %}
        <div class="btns">
            <a class="btn primary" href="/ui/dashboard">Back to dashboard</a>
            <button class="btn ghost" onclick="history.back()">Go back</button>
        </div>
    </main>
</body>
</html>
