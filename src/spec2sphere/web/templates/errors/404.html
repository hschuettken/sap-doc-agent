<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found — Spec2Sphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/atlas-tokens.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--atlas-font-sans);
            font-size: var(--atlas-text-base);
            background-color: var(--atlas-color-bg);
            color: var(--atlas-color-fg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background-color: var(--atlas-color-surface);
            border: 1px solid var(--atlas-color-border);
            border-radius: var(--atlas-radius-lg);
            box-shadow: var(--atlas-shadow-3);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .code {
            font-size: 4.5rem;
            color: var(--atlas-color-primary);
            line-height: 1;
            margin-bottom: 0.5rem;
            font-weight: var(--atlas-font-weight-bold);
            letter-spacing: var(--atlas-tracking-tight);
        }
        .bar {
            width: 48px;
            height: 3px;
            background-color: var(--atlas-color-primary);
            margin: 1rem auto 1.5rem;
            border-radius: var(--atlas-radius-full);
        }
        h1 {
            color: var(--atlas-color-fg);
            font-size: var(--atlas-text-xl);
            margin: 0 0 0.75rem;
            font-weight: var(--atlas-font-weight-semibold);
        }
        p {
            color: var(--atlas-color-fg-muted);
            font-size: var(--atlas-text-sm);
            line-height: 1.6;
            margin: 0 0 1.5rem;
        }
        .path {
            font-family: var(--atlas-font-mono);
            background-color: var(--atlas-color-elevated);
            border: 1px solid var(--atlas-color-border);
            padding: 0.375rem 0.625rem;
            border-radius: var(--atlas-radius-sm);
            font-size: var(--atlas-text-xs);
            color: var(--atlas-color-fg-muted);
            word-break: break-all;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        a.btn {
            display: inline-block;
            padding: 0.625rem 1.5rem;
            background-color: var(--atlas-color-primary);
            color: var(--atlas-color-primary-fg);
            text-decoration: none;
            border-radius: var(--atlas-radius-md);
            font-size: var(--atlas-text-sm);
            font-weight: var(--atlas-font-weight-medium);
            transition: background-color var(--atlas-duration-fast) var(--atlas-ease-standard);
        }
        a.btn:hover { background-color: var(--atlas-color-primary-hover); }
        a.btn:focus-visible {
            outline: 2px solid var(--atlas-color-focus-ring);
            outline-offset: 2px;
        }
    </style>
    <script>
        (function() {
            var t = localStorage.getItem('atlasTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <main class="card">
        <div class="code">404</div>
        <div class="bar" aria-hidden="true"></div>
        <h1>Page not found</h1>
        <p>The resource you requested doesn&rsquo;t exist, has been moved, or requires a different permission.</p>
        {% if path %}<div class="path">{{ path }}</div>{% endif %}
        <div><a class="btn" href="/ui/dashboard">Back to dashboard</a></div>
    </main>
</body>
</html>
