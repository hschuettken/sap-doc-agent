# Minimal SearXNG config for dsp-ai external fetcher.
# Exposes JSON output; rate-limiting disabled in dev.

use_default_settings: true

general:
  instance_name: "Spec2Sphere SearXNG"
  debug: false

search:
  safe_search: 0
  formats:
    - html
    - json

server:
  limiter: false
  public_instance: false
  image_proxy: false
  secret_key: "${SEARXNG_SECRET:-change-me}"
  bind_address: "0.0.0.0"
  port: 8080

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 20
  pool_maxsize: 40

engines:
  - name: duckduckgo
    disabled: false
  - name: bing
    disabled: false
