version: "3.9"
# SAP Doc Agent — Client Deployment Compose
# Usage: docker compose -f deploy/docker-compose.client.yml up -d
# Prerequisites: copy deploy/.env.client.example to .env and fill in values

services:
  web:
    image: ghcr.io/atlas/sap-doc-agent:latest
    command: uvicorn sap_doc_agent.web.server:create_app --factory --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapdoc-net

  worker:
    image: ghcr.io/atlas/sap-doc-agent:latest
    command: celery -A sap_doc_agent.tasks.celery_app worker -Q scan,llm -c 4 --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapdoc-net

  worker-chrome:
    image: ghcr.io/atlas/sap-doc-agent:latest
    command: celery -A sap_doc_agent.tasks.celery_app worker -Q chrome -c 1 --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapdoc-net

  scheduler:
    image: ghcr.io/atlas/sap-doc-agent:latest
    command: celery -A sap_doc_agent.tasks.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapdoc-net

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - sapdoc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sapdoc}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sapdoc-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - sapdoc-net

volumes:
  sapdoc-postgres:

networks:
  sapdoc-net:
    driver: bridge
